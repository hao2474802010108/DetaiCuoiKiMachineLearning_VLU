<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <span class="logo-text">MovieHub</span>
    </div>

    <div class="header-center">
        <div class="search-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="movieInput" class="header-input" placeholder="Tìm phim..." onkeydown="if(event.key==='Enter') search()">
            <button class="header-btn" onclick="search()">Tìm</button>
        </div>
    </div>

    <div class="header-right">
        <span class="tagline">Khám phá thế giới điện ảnh</span>
    </div>
</header>

<div id="section-title" class="section-label"></div>
<div id="movies" class="movie-grid"></div>

<div id="random-title" class="section-label" style="margin-top: 32px;">Đề Xuất Hôm Nay</div>
<div id="random-movies" class="movie-grid"></div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
